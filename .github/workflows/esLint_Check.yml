name: Lint
on: [push, pull_request]

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com)
        
      - name: Install Node.js
        uses: [actions/setup-node@v4](https://github.com)
        with:
          node-version: '20' # Match your project's version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        # This will fail the build if errors are found
        run: npx eslint .
