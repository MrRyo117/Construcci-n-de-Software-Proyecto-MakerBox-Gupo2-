<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Makerbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="wrapper">
      <form action="">
        <h1>Login Makerbox</h1>
        <div class="input-box">
          <input type="text" id="Usuario" placeholder="Rut" required />
        </div>

        <div class="input-box">
          <input
            type="password"
            id="Contraseña"
            placeholder="Contraseña"
            required
          />
        </div>

        <div class="remember-forgot">
          <label><input type="checkbox" /> Recordarme</label>
          <a href="#">Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" id="submit" class="boton">Login</button>

        <div class="link-registro">
          <p>
            ¿No tienes una cuenta?
            <a href="registroUsuario.html">Registrate aqui</a>
          </p>
        </div>

        <p id="respuesta"></p>
      </form>
    </div>
    <script src="UsuarioLogin.js"></script>
  </body>
</html>
